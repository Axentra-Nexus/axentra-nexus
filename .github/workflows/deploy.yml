name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --experimental-vm-modules

      - name: Fix asset paths
        run: |
          sed -i 's|href="/assets/|href="/axentra-nexus/assets/|g' ./dist/client/index.html
          sed -i 's|src="/assets/|src="/axentra-nexus/assets/|g' ./dist/client/index.html

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/client
